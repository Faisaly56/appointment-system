<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1d4ed8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Tahoma, Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .error-box {
            background: rgba(17, 24, 39, 0.96);
            padding: 40px 28px;
            border-radius: 22px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .error-code {
            font-size: 4rem;
            font-weight: bold;
            color: #facc15;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .error-text {
            color: #cbd5e1;
            margin-bottom: 24px;
        }

        .btn-home {
            background: linear-gradient(135deg, #15803d, #14532d);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px 24px;
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #166534, #14532d);
            color: white;
        }
    </style>
</head>
<body dir="rtl">

<div class="error-box">
    <div class="error-code">404</div>
    <div class="error-title">الصفحة غير موجودة</div>
    <div class="error-text">
        يبدو أن الصفحة التي تحاول الوصول إليها غير متوفرة أو تم نقلها.
    </div>

    <a href="{{ url_for('home') }}" class="btn btn-home">العودة إلى الصفحة الرئيسية</a>
</div>

</body>
</html>
