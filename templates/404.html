<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-box {
            max-width: 520px;
            width: 100%;
        }
        .error-code {
            font-size: 4rem;
            font-weight: bold;
            color: #facc15;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .error-text {
            color: #cbd5e1;
            margin-bottom: 24px;
        }
    </style>
</head>
<body dir="rtl">

<div class="error-box card-modern fade-in">
    <div class="error-code">404</div>
    <div class="error-title">الصفحة غير موجودة</div>
    <div class="error-text">
        يبدو أن الصفحة التي تحاول الوصول إليها غير متوفرة أو تم نقلها.
    </div>

    <a href="{{ url_for('home') }}" class="btn btn-green">العودة إلى الصفحة الرئيسية</a>
</div>

</body>
</html>
