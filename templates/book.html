<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            min-height: 100vh;
        }
    </style>
</head>
<body dir="rtl">

<div class="container py-4 fade-in">

    <div class="navbar-modern d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span class="fw-bold">حجز موعد</span>
        <div class="d-flex gap-2">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">الرئيسية</a>
            <a href="{{ url_for('appointments') }}" class="btn btn-outline-light btn-sm">المواعيد</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card-modern">
                <h3 class="mb-4 text-center fw-bold">إضافة موعد جديد</h3>

                <div class="hint-box text-center mb-4">
                    ⏰ ساعات العمل: من 9 صباحًا إلى 5 مساءً
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                        <div class="alert alert-warning alert-modern text-center">
                            {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="mb-2">التاريخ</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="mb-2">الوقت</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="mb-2">ملاحظات (اختياري)</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="اكتب ملاحظة..."></textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button type="submit" class="btn btn-green px-4">تأكيد الحجز</button>
                        <a href="{{ url_for('appointments') }}" class="btn btn-gold px-4">رجوع</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
