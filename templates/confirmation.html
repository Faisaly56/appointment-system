<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحجز</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #052e16, #166534);
            min-height: 100vh;
            font-family: Tahoma, Arial, sans-serif;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.30);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-card {
            background: white;
            border-radius: 22px;
            padding: 35px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.20);
            text-align: center;
        }

        .success-icon {
            font-size: 3rem;
        }

        .info-box {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
            text-align: right;
        }

        .info-box p {
            margin-bottom: 10px;
            font-size: 1.05rem;
        }
    </style>
</head>

<body dir="rtl">

<div class="overlay">
    <div class="confirm-card">

        <div class="success-icon mb-3">✅</div>

        <h2 class="mb-3">تم تأكيد الحجز بنجاح</h2>

        <p class="text-muted">
            تم تسجيل الموعد في النظام، وهذه تفاصيل الحجز:
        </p>

        <div class="info-box">
            <p><strong>الاسم:</strong> {{ name }}</p>
            <p><strong>التاريخ:</strong> {{ date }}</p>
            <p><strong>الوقت:</strong> {{ time }}</p>
        </div>

        <div class="mt-4 d-flex gap-2 justify-content-center">
            <a href="{{ url_for('home') }}" class="btn btn-success px-4">
                الصفحة الرئيسية
            </a>

            <a href="{{ url_for('book') }}" class="btn btn-outline-secondary px-4">
                حجز موعد آخر
            </a>
        </div>

    </div>
</div>

</body>
</html>
