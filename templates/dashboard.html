<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1d4ed8);
            min-height: 100vh;
            font-family: Tahoma, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .main-card {
            background: rgba(17,24,39,0.95);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .main-card h1 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn-green {
            background: linear-gradient(135deg, #15803d, #14532d);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px 20px;
            font-weight: bold;
        }

        .btn-gold {
            background: linear-gradient(135deg, #c9a227, #a67c00);
            border: none;
            border-radius: 10px;
            color: #111;
            padding: 10px 20px;
            font-weight: bold;
        }

        .team-card {
            margin-top: 25px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .team-title {
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .team-grid div {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.team-dot {
    color: #d4af37;
    font-size: 1.1rem;
    line-height: 1;
}

        .supervisor-name {
            color: #d4af37;
            font-weight: bold;
            margin-top: 10px;
        }

        .corner-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 140px;
            height: 140px;
            z-index: 30;
            background: transparent;
        }

        .corner-text {
            position: fixed;
            bottom: 14px;
            right: 18px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212,175,55,0.45);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 31;
            user-select: none;
            pointer-events: none;
        }

        .corner-trigger:hover + .corner-text {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body dir="rtl">

<div class="overlay">

    <div class="top-bar">
        <div>مرحبًا {{ full_name }}</div>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">تسجيل خروج</a>
    </div>

    <div class="main-card">
        <h1>نظام حجز المواعيد</h1>

        <p>لوحة رئيسية للتنقل داخل النظام بسهولة</p>

        <div class="info-box">
            ساعات العمل: <strong>9:00 صباحًا - 5:00 مساءً</strong>
        </div>

        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('book') }}" class="btn btn-green">حجز موعد</a>
            <a href="{{ url_for('appointments') }}" class="btn btn-gold">عرض المواعيد</a>
        </div>
    </div>

    <div class="team-card">
        <div class="team-title">مشروع رقم 3 - أسماء المتدربين</div>

        <div class="team-grid">
            <div>• فيصل عريبان</div>
            <div>• يحيى سبعي </div>
            <div>• محمد منقري</div>
            <div>• هشام ناجعي</div>
            <div>• محمد عبيري</div>
            <div>• رائد سويد</div>
        </div>

        <div class="supervisor-name">د. أكرم بن عقيل</div>
    </div>

</div>

<div class="corner-trigger"></div>
<div class="corner-text">Faisal 1</div>

</body>
</html>
