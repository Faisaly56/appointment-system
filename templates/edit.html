<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الموعد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body dir="rtl" class="bg-dark text-light">

<div class="container py-5">
    <h2 class="mb-4 text-center">تعديل الموعد</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning text-center">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card bg-secondary text-light p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">التاريخ</label>
                <input type="date" name="date" class="form-control" value="{{ appointment['date'] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">الوقت</label>
                <input type="time" name="time" class="form-control" value="{{ appointment['time'] }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">حفظ التعديلات</button>
                <a href="{{ url_for('appointments') }}" class="btn btn-light">رجوع</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
