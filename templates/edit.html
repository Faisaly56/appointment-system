<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الموعد</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1d4ed8);
            min-height: 100vh;
            font-family: Tahoma, Arial, sans-serif;
            color: white;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.28);
            padding-bottom: 40px;
        }

        .navbar {
            background: rgba(2, 6, 23, 0.85) !important;
        }

        .form-card {
            background: #111827;
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.38);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .form-control {
            background: #0f172a;
            color: white;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .form-control:focus {
            border-color: #facc15;
            box-shadow: 0 0 0 0.2rem rgba(250, 204, 21, 0.15);
            background: #0f172a;
            color: white;
        }

        .btn-warning {
            background: #facc15;
            color: #111827;
            border-radius: 12px;
            font-weight: bold;
            border: none;
        }

        .btn-warning:hover {
            background: #eab308;
            color: #111827;
        }

        .btn-secondary {
            background: #334155;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            border: none;
        }

        .btn-secondary:hover {
            background: #475569;
            color: white;
        }

        .hint-box {
            background: rgba(250, 204, 21, 0.12);
            border: 1px solid rgba(250, 204, 21, 0.25);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            color: #fde68a;
        }

        .alert {
            border-radius: 14px;
        }
    </style>
</head>

<body dir="rtl">
<div class="overlay">

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">تعديل الموعد</span>

        <div class="d-flex gap-2">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">الرئيسية</a>
            <a href="{{ url_for('appointments') }}" class="btn btn-outline-light btn-sm">المواعيد</a>
        </div>
    </div>
</nav>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-7">

<div class="form-card">

<h3 class="mb-4 text-center">تعديل بيانات الموعد</h3>

<div class="hint-box text-center">
    ⏰ التعديل مسموح فقط ضمن ساعات العمل من 9 صباحًا إلى 5 مساءً
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, msg in messages %}
        <div class="alert alert-warning text-center">
            {{ msg }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
    <label>التاريخ</label>
    <input type="date" name="date" class="form-control" value="{{ appointment['date'] }}" required>
</div>

<div class="mb-3">
    <label>الوقت</label>
    <input type="time" name="time" class="form-control" value="{{ appointment['time'] }}" required>
</div>

<div class="mb-3">
    <label>ملاحظات (اختياري)</label>
    <textarea name="notes" class="form-control" rows="3" placeholder="اكتب ملاحظة...">{{ appointment['notes'] }}</textarea>
</div>

<div class="d-flex gap-2 justify-content-center mt-4">
    <button type="submit" class="btn btn-warning px-4">حفظ التعديلات</button>
    <a href="{{ url_for('appointments') }}" class="btn btn-secondary px-4">رجوع</a>
</div>

</form>

</div>

</div>
</div>
</div>

</div>
</body>
</html>
