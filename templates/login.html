<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1d4ed8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Tahoma, Arial, sans-serif;
        }

        .login-box {
            background: #111827;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            font-weight: bold;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: #0f172a;
            color: white;
            box-shadow: 0 0 0 2px rgba(250,204,21,0.25);
            border-color: #facc15;
        }

        .btn-login {
            background: linear-gradient(135deg, #c9a227, #a67c00);
            border: none;
            color: #111827;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #b8962e, #8f6d00);
            color: #111827;
        }

        .links {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.92rem;
        }

        .links a:hover {
            color: white;
        }

        .alert {
            border-radius: 12px;
        }
    </style>
</head>
<body dir="rtl">

<div class="login-box">
    <h2>تسجيل الدخول</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-danger text-center">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="email" class="form-control mb-3" placeholder="البريد الإلكتروني" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="كلمة المرور" required>
        <button type="submit" class="btn btn-login w-100">دخول</button>
    </form>

    <div class="links">
        <a href="{{ url_for('register') }}">إنشاء حساب</a>
        <a href="#">نسيت كلمة المرور؟</a>
    </div>
</div>

</body>
</html>
