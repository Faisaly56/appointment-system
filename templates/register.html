<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1d4ed8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Tahoma, Arial, sans-serif;
            color: white;
        }

        .box {
            background: rgba(17, 24, 39, 0.96);
            padding: 35px;
            border-radius: 22px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .box h2 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .box-subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: #0f172a;
            color: white;
            border-color: #22c55e;
            box-shadow: 0 0 0 0.2rem rgba(34,197,94,0.15);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-register {
            background: linear-gradient(135deg, #15803d, #14532d);
            border: none;
            font-weight: bold;
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .btn-register:hover {
            background: linear-gradient(135deg, #166534, #14532d);
            color: white;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #94a3b8;
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }

        .alert {
            border-radius: 12px;
        }
    </style>
</head>
<body dir="rtl">

<div class="box">
    <h2>إنشاء حساب</h2>
    <div class="box-subtitle">أنشئ حسابًا جديدًا للوصول إلى نظام حجز المواعيد</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div class="alert alert-warning text-center">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="full_name" class="form-control" placeholder="الاسم الكامل" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="البريد الإلكتروني" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
        </div>

        <button type="submit" class="btn btn-register w-100">إنشاء الحساب</button>
    </form>

    <a href="{{ url_for('login') }}" class="back-link">لديك حساب بالفعل؟ تسجيل الدخول</a>
</div>

</body>
</html>
