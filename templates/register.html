<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-box {
            width: 100%;
            max-width: 430px;
        }
        .box-subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body dir="rtl">

<div class="register-box card-modern fade-in">
    <h2 class="text-center mb-2 fw-bold">إنشاء حساب</h2>
    <div class="box-subtitle">أنشئ حسابًا جديدًا للوصول إلى نظام حجز المواعيد</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div class="alert alert-warning alert-modern text-center">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="full_name" class="form-control" placeholder="الاسم الكامل" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="البريد الإلكتروني" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
        </div>

        <button type="submit" class="btn btn-green w-100">إنشاء الحساب</button>
    </form>

    <a href="{{ url_for('login') }}" class="d-block text-center mt-3 text-decoration-none text-light">
        لديك حساب بالفعل؟ تسجيل الدخول
    </a>
</div>

</body>
</html>
